    const ToastContext = createContext(null);

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);

      const addToast = (message, type = 'success') => {
        const id = Math.random().toString(36).substring(2, 9);
        setToasts((prev) => [...prev, { id, message, type }]);
        setTimeout(() => removeToast(id), 4000);
      };

      const removeToast = (id) => {
        setToasts((prev) => prev.filter((t) => t.id !== id));
      };

      return (
        <ToastContext.Provider value={{ addToast }}>
          {children}
          <div className="fixed bottom-5 right-5 z-50 flex flex-col gap-3 max-w-sm w-full no-print">

              <div 
                key={toast.id} 
                className={`flex items-center justify-between p-4 rounded-lg shadow-lg border animate-slide-up w-full ${

                  toast.type === 'error' ? 'bg-red-50 dark:bg-red-950/30 border-l-4 border-red-500 text-red-800 dark:text-red-200' :
                  'bg-blue-50 dark:bg-blue-950/30 border-l-4 border-blue-500 text-blue-800 dark:text-blue-200'
                }`}
              >
                <div className="flex items-center gap-3">
                  {toast.type === 'success' && <Icons.CheckCircle2 className="text-brand-gold shrink-0" />}

                  {toast.type === 'info' && <Icons.Info className="text-blue-500 shrink-0" />}
                  <span className="text-sm font-medium">{toast.message}</span>
                </div>
                <button 
                  onClick={() => removeToast(toast.id)} 
                  className="text-brand-dark/40 hover:text-brand-dark dark:text-brand-cream/40 dark:hover:text-brand-cream p-1 rounded transition-colors ml-4"
                >
                  <Icons.X className="w-4 h-4" />
                </button>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );

    const generateSimulatedSuggestion = (roomType, colourPreference, budget) => {
      const parsedBudget = Number(budget) || 100000;
      
      const catalog = {
        "Living Room": [

        "Bedroom": [

          { name: "SVS Modern Bedside Lockers (Pair)", material: "Sheesham Wood", priceFactor: 0.15 },
          { name: "SVS Royal Wardrobe", material: "Teak Plywood & Laminate Finish", priceFactor: 0.3 },
          { name: "SVS Comfort Dressing Mirror Table", material: "Solid Wood & Mirror Glass", priceFactor: 0.1 }

          { name: "SVS Ergonomic Spine-Support Chair", material: "Pneumatic Lift & Breathable Mesh", priceFactor: 0.25 },
          { name: "SVS Library Bookshelf Cabinet", material: "Walnut Veneer & Glass Doors", priceFactor: 0.25 },
          { name: "SVS Mobile Filing Cabinet drawers", material: "Engineered Wood", priceFactor: 0.1 }
        ],
        "Dining Room": [
          { name: "SVS Royal Dining Table", material: "Solid Teak Wood Top", priceFactor: 0.45 },
          { name: "SVS Matching Dining Chairs (Set of 6)", material: "Solid Teak & Cushioned Seat", priceFactor: 0.35 },
          { name: "SVS Dining Room Crockery Console", material: "Teak Wood Veneer", priceFactor: 0.2 }
        ],
        "Kitchen": [
          { name: "SVS Modular Counter Storage Set", material: "Marine Grade Plywood & Acrylic Finish", priceFactor: 0.5 },
          { name: "SVS Tall Kitchen Pantry Cabinet", material: "Marine Grade Plywood & Laminate", priceFactor: 0.35 },
          { name: "SVS Swivel Counter Breakfast Stools (Set of 2)", material: "Steel frame & Leather upholstery", priceFactor: 0.15 }
        ]
      };

      const selectedSet = catalog[roomType] || catalog["Living Room"];
      
      let totalCost = 0;
      const furnitureSet = selectedSet.map((item) => {
        let price = Math.round(parsedBudget * item.priceFactor);
        price = Math.round(price / 100) * 100;
        if (price < 3000) price = 3000;
        totalCost += price;
        return { name: item.name, material: item.material, price };
      });

      if (totalCost > parsedBudget) {
        const scaleFactor = (parsedBudget * 0.95) / totalCost;
        totalCost = 0;
        furnitureSet.forEach(item => {
          item.price = Math.round((item.price * scaleFactor) / 100) * 100;
          if (item.price < 2000) item.price = 2000;
          totalCost += item.price;
        });
      }

      const remaining = parsedBudget - totalCost;
      const colorText = colourPreference || "Earth tones";

      return {
        furnitureSet,
        colourStyleNotes: `The design utilizes your preferred ${colorText} color scheme to elevate the natural charm of the solid wooden pieces. For a ${roomType}, we focus on balancing functional storage and comfortable seating. The warm tones of teak or sheesham wood interact perfectly with ${colorText} paint accents, resulting in an upscale, personalized environment designed specifically by Sri Venkata Sai Furniture Works.`,

    function BarChart({ data }) {
      if (!data || data.length === 0) return <p className="text-center py-4 text-xs text-brand-textMuted">No data to display</p>;
      const maxVal = Math.max(...data.map(d => d.count), 1);
      const chartHeight = data.length * 50;

      return (
        <svg width="100%" height={chartHeight} viewBox={`0 0 500 ${chartHeight}`} className="font-sans">
          {data.map((item, idx) => {
            const barWidth = (item.count / maxVal) * 320;
            const y = idx * 50 + 10;
            return (
              <g key={item.name} className="group cursor-pointer">
                <text x="10" y={y + 17} className="text-xs font-semibold fill-brand-dark dark:fill-brand-cream/80">{item.name}</text>
                <rect x="130" y={y} width="320" height="24" rx="4" className="fill-brand-dark/5 dark:fill-brand-cream/5" />
                <rect x="130" y={y} width={barWidth || 5} height="24" rx="4" className="fill-brand-gold transition-all duration-700 ease-out hover:fill-brand-goldLight" />
                <text x={130 + barWidth + 10} y={y + 17} className="text-xs font-bold fill-brand-gold">{item.count}</text>
              </g>
            );
          })}
        </svg>
      );
    }

    function DonutChart({ data }) {
      if (!data || data.length === 0) return <p className="text-center py-4 text-xs text-brand-textMuted">No data to display</p>;
      const total = data.reduce((sum, item) => sum + item.value, 0);
      if (total === 0) return <p className="text-center py-4 text-xs text-brand-textMuted">No data to display</p>;

      const radius = 55;
      const strokeWidth = 18;
      const circ = 2 * Math.PI * radius;
      const center = 80;
      const colors = ['#8B6914', '#2C1810', '#C5A85C', '#E6DEC9'];

      let accumulatedPercent = 0;
      const slices = data.map((item, idx) => {
        const percent = item.value / total;
        const strokeLength = percent * circ;
        const strokeOffset = circ - (accumulatedPercent * circ);
        accumulatedPercent += percent;
        return {
          ...item,
          strokeLength,
          strokeOffset,
          color: colors[idx % colors.length],
          percentage: Math.round(percent * 100)
        };
      });

      return (
        <div className="flex flex-col sm:flex-row items-center justify-around gap-6 py-4">
          <div className="relative w-40 h-40">
            <svg width="100%" height="100%" viewBox="0 0 160 160" className="-rotate-90">
              <circle cx={center} cy={center} r={radius} fill="transparent" stroke="rgba(0,0,0,0.03)" strokeWidth={strokeWidth} />
              {slices.map((slice) => (
                slice.value > 0 && (
                  <circle
                    key={slice.label}
                    cx={center}
                    cy={center}
                    r={radius}
                    fill="transparent"
                    stroke={slice.color}
                    strokeWidth={strokeWidth}
                    strokeDasharray={`${slice.strokeLength} ${circ}`}
                    strokeDashoffset={slice.strokeOffset}
                    strokeLinecap="round"
                    className="transition-all duration-1000 ease-out hover:opacity-90"
                  />
                )
              ))}
            </svg>
            <div className="absolute inset-0 flex flex-col items-center justify-center">
              <span className="text-xl font-serif font-bold text-brand-dark dark:text-brand-cream">{total}</span>
              <span className="text-[9px] uppercase tracking-wider text-brand-textMuted">Total Sets</span>
            </div>
          </div>
          <div className="flex flex-col gap-2">
            {slices.map((slice) => (
              <div key={slice.label} className="flex items-center gap-3 text-xs">
                <span className="w-3.5 h-3.5 rounded-full shrink-0" style={{ backgroundColor: slice.color }}></span>
                <span className="font-medium text-brand-dark/80 dark:text-brand-cream/80">{slice.label}:</span>
                <span className="font-bold text-brand-dark dark:text-brand-cream">{slice.value} ({slice.percentage}%)</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function LineChart({ data }) {
      if (!data || data.length === 0) return <p className="text-center py-4 text-xs text-brand-textMuted">No data to display</p>;
      const maxVal = Math.max(...data.map(d => d.count), 2);
      
      const width = 500;
      const height = 180;
      const paddingX = 40;
      const paddingY = 20;
      const chartWidth = width - paddingX * 2;
      const chartHeight = height - paddingY * 2;

      const points = data.map((item, idx) => {
        const x = paddingX + (idx / (data.length - 1)) * chartWidth;
        const y = paddingY + chartHeight - (item.count / maxVal) * chartHeight;
        return { x, y, label: item.label, count: item.count };
      });

      const linePath = points.map((p, idx) => `${idx === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
      const areaPath = `${linePath} L ${points[points.length - 1].x} ${height - paddingY} L ${points[0].x} ${height - paddingY} Z`;

      return (
        <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} className="font-sans">
          <defs>
            <linearGradient id="chartGradient" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#8B6914" stopOpacity="0.25" />
              <stop offset="100%" stopColor="#8B6914" stopOpacity="0.0" />
            </linearGradient>
          </defs>
          {[0, 0.5, 1].map((ratio) => {
            const y = paddingY + chartHeight * ratio;
            const gridLabel = Math.round(maxVal * (1 - ratio));
            return (
              <g key={ratio}>
                <line x1={paddingX} y1={y} x2={width - paddingX} y2={y} className="stroke-brand-dark/10 dark:stroke-brand-cream/10" strokeDasharray="4 4" />
                <text x={paddingX - 10} y={y + 4} textAnchor="end" className="text-[10px] fill-brand-textMuted font-bold">{gridLabel}</text>
              </g>
            );
          })}
          <path d={areaPath} fill="url(#chartGradient)" />
          <path d={linePath} fill="transparent" stroke="#8B6914" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
          {points.map((p, idx) => (
            <g key={idx} className="group">
              <circle cx={p.x} cy={p.y} r="8" className="fill-brand-gold/0 group-hover:fill-brand-gold/20 transition-all cursor-pointer" />
              <circle cx={p.x} cy={p.y} r="4.5" className="fill-brand-cream stroke-brand-gold stroke-2 dark:fill-brand-bgDark transition-transform group-hover:scale-125 cursor-pointer" />
              <g className="opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                <rect x={p.x - 18} y={p.y - 28} width="36" height="20" rx="4" className="fill-brand-dark dark:fill-brand-cream" />
                <text x={p.x} y={p.y - 15} textAnchor="middle" className="text-[10px] font-bold fill-brand-cream dark:fill-brand-dark">{p.count}</text>
              </g>
              <text x={p.x} y={height - 2} textAnchor="middle" className="text-[10px] fill-brand-textMuted font-medium">{p.label}</text>
            </g>
          ))}
        </svg>
      );
    }

                return (
                  <div key={item.id} className={`bg-white dark:bg-brand-cardDark border rounded-2xl transition-all duration-200 overflow-hidden shadow-sm ${isExpanded ? 'border-brand-gold/60 ring-1 ring-brand-gold/20' : 'border-brand-dark/10 dark:border-brand-cream/10'}`}>
                    <div onClick={() => toggleExpand(item.id)} className="p-5 flex items-center justify-between cursor-pointer select-none gap-4">
                      <div className="flex items-center gap-3.5">
                        <div className="bg-brand-gold/10 text-brand-gold p-2.5 rounded-xl shrink-0">
                          <Icons.Armchair className="w-5 h-5" />
                        </div>
                        <div>
                          <div className="flex items-center gap-2">
                            <h3 className="font-serif text-base font-bold text-brand-dark dark:text-brand-cream">{item.roomType}</h3>
                            {item.rating && <span className="text-[10px] font-bold text-brand-gold bg-brand-gold/10 px-2 py-0.5 rounded">★ {item.rating}</span>}
                          </div>
                          <div className="flex flex-wrap items-center gap-x-4 gap-y-1 text-xs text-brand-textMuted font-medium pt-0.5">
                            <span className="flex items-center gap-1"><Icons.Calendar className="w-3.5 h-3.5" />{new Date(item.createdAt).toLocaleDateString('en-IN')}</span>
                            <span>Budget: <strong>₹{item.budget.toLocaleString('en-IN')}</strong></span>
                          </div>
                        </div>
                      </div>
                      
                      <div className="flex items-center gap-3">
                        <button onClick={(e) => handleDelete(e, item.id)} className="p-2 rounded-lg text-brand-textMuted hover:text-red-500 hover:bg-red-500/10 transition-colors">
                          <Icons.Trash2 className="w-4 h-4" />
                        </button>
                        <div className="p-1 text-brand-textMuted bg-brand-cream/60 dark:bg-brand-bgDark rounded-lg">
                          {isExpanded ? <Icons.ChevronUp className="w-4 h-4" /> : <Icons.ChevronDown className="w-4 h-4" />}
                        </div>
                      </div>
                    </div>

                    {isExpanded && (
                      <div className="border-t border-brand-dark/10 dark:border-brand-cream/10 bg-brand-cream/10 dark:bg-brand-bgDark/20 p-6 sm:p-8 space-y-6">
                        <div>
                          <h4 className="font-serif text-sm font-bold uppercase tracking-wider text-brand-textMuted mb-3">Furniture Items</h4>
                          <div className="border border-brand-dark/10 dark:border-brand-cream/10 rounded-xl overflow-hidden bg-white dark:bg-brand-cardDark">
                            {item.recommendation.furnitureSet.map((fItem, fIdx) => (
                              <div key={fIdx} className="flex justify-between p-3.5 border-b border-brand-dark/5 dark:border-brand-cream/5 last:border-b-0 text-xs sm:text-sm">
                                <div>
                                  <p className="font-serif font-bold text-brand-dark dark:text-brand-cream">{fItem.name}</p>
                                  <p className="text-[10px] text-brand-textMuted font-medium pt-0.5">Material: {fItem.material}</p>
                                </div>
                                <span className="font-bold text-brand-gold pt-1">₹{fItem.price.toLocaleString('en-IN')}</span>
                              </div>
                            ))}
                          </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 text-sm">
                          <div className="space-y-2">
                            <h4 className="font-serif text-xs font-bold uppercase tracking-wider text-brand-textMuted">Colour & Styling details</h4>
                            <div className="p-4 bg-white dark:bg-brand-cardDark rounded-xl border border-brand-dark/5 dark:border-brand-cream/5 text-xs leading-relaxed text-brand-dark/80 dark:text-brand-cream/80">{item.recommendation.colourStyleNotes}</div>
                          </div>
                          <div className="space-y-2">
                            <h4 className="font-serif text-xs font-bold uppercase tracking-wider text-brand-textMuted">Styling Tips</h4>
                            <ul className="space-y-2">
                              {item.recommendation.stylingTips.map((tip, tIdx) => (
                                <li key={tIdx} className="flex gap-2 text-xs text-brand-dark/80 dark:text-brand-cream/80">
                                  <span className="w-4 h-4 rounded-full bg-brand-gold/15 text-brand-gold font-bold flex items-center justify-center text-[10px] shrink-0 mt-0.5">{tIdx + 1}</span>
                                  <span>{tip}</span>
                                </li>
                              ))}
                            </ul>
                          </div>
                        </div>

                        <div className="p-4.5 bg-brand-gold/5 border border-brand-gold/20 rounded-xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 text-xs">
                          <div>
                            <p className="text-brand-textMuted font-semibold uppercase text-[9px] tracking-wider">Estimated Investment</p>
                            <p className="text-brand-dark dark:text-brand-cream">Total Set Cost: <strong>₹{item.recommendation.budgetSummary.totalCost.toLocaleString('en-IN')}</strong> (Remaining: ₹{item.recommendation.budgetSummary.remaining.toLocaleString('en-IN')})</p>
                          </div>
                          <span className="text-[10px] italic text-brand-textMuted">{item.recommendation.budgetSummary.notes}</span>
                        </div>

                        {/* Interactive Star Rating */}
                        <div className="flex items-center gap-1.5 pt-2 font-semibold">
                          <span className="text-xs font-semibold text-brand-textMuted">Feedback Rating:</span>
                          {[1, 2, 3, 4, 5].map((idx) => (
                            <button
                              key={idx}
                              type="button"
                              onClick={() => handleUpdateRate(item.id, idx)}
                              className="text-brand-gold p-0.5 hover:scale-110 transition-transform animate-fade-in"
                            >
                              <Icons.Star className={`w-5 h-5 ${idx <= (item.rating || 0) ? 'fill-brand-gold text-brand-gold' : 'text-brand-dark/20 dark:text-brand-cream/20'}`} />
                            </button>
                          ))}
                        </div>

                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // 4. ADMIN ANALYTICS DASHBOARD PAGE
    function AdminDashboard({ list, onRefresh }) {
      const totalSuggestions = list.length;
      
      const rated = list.filter(i => i.rating !== null && i.rating > 0);
      const averageRating = rated.length > 0 ? Number((rated.reduce((sum, item) => sum + item.rating, 0) / rated.length).toFixed(1)) : 0;

      // Group popularity
      const roomCounts = {};
      list.forEach(i => roomCounts[i.roomType] = (roomCounts[i.roomType] || 0) + 1);
      const popularRoomTypes = Object.keys(roomCounts).map(name => ({ name, count: roomCounts[name] })).sort((a,b) => b.count - a.count);

      // Budgets
      const ranges = {
        'Budget (< ₹50k)': 0,
        'Mid-Range (₹50k - ₹100k)': 0,
        'Premium (₹100k - ₹200k)': 0,
        'Luxury (₹200k+)': 0
      };
      list.forEach(item => {
        const b = item.budget;
        if (b < 50000) ranges['Budget (< ₹50k)']++;
        else if (b <= 100000) ranges['Mid-Range (₹50k - ₹100k)']++;
        else if (b <= 200000) ranges['Premium (₹100k - ₹200k)']++;
        else ranges['Luxury (₹200k+)']++;
      });
      const budgetDistribution = Object.keys(ranges).map(label => ({ label, value: ranges[label] }));

      // Daily Trend (Last 7 Days)
      const dailyTrend = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const dString = d.toISOString().split('T')[0];
        const dLabel = d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
        
        const count = list.filter(item => item.createdAt.split('T')[0] === dString).length;
        dailyTrend.push({ date: dString, label: dLabel, count });
      }

      return (
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 space-y-10">
          <div className="flex flex-col sm:flex-row justify-between items-center gap-4 border-b border-brand-dark/10 dark:border-brand-cream/10 pb-6">
            <div className="text-center sm:text-left space-y-1">
              <h1 className="font-serif text-3xl font-bold text-brand-dark dark:text-brand-cream">Admin Analytics Dashboard</h1>
              <p className="text-sm text-brand-textMuted">Monitor AI system performance, customer usage trends, and design quality ratings.</p>
            </div>
            
            <button
              onClick={onRefresh}
              className="flex items-center gap-2 border border-brand-dark/20 hover:border-brand-dark dark:border-brand-cream/20 dark:hover:border-brand-cream hover:bg-brand-cream/30 dark:hover:bg-brand-cream/5 text-xs font-semibold px-4 py-2.5 rounded-lg transition-all active:scale-95"
            >
              <Icons.RefreshCw className="w-3.5 h-3.5 shrink-0" />
              <span>Refresh Metrics</span>
            </button>
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div className="bg-white dark:bg-brand-cardDark p-6 rounded-2xl border border-brand-dark/10 dark:border-brand-cream/10 shadow-sm flex items-center justify-between">
              <div className="space-y-1.5">
                <span className="text-[10px] font-bold uppercase tracking-wider text-brand-textMuted">Total Mood Boards</span>
                <p className="text-3xl font-bold font-serif text-brand-dark dark:text-brand-cream">{totalSuggestions}</p>
              </div>
              <div className="bg-brand-gold/10 p-3 rounded-xl text-brand-gold">
                <Icons.LayoutDashboard className="w-6 h-6" />
              </div>
            </div>

            <div className="bg-white dark:bg-brand-cardDark p-6 rounded-2xl border border-brand-dark/10 dark:border-brand-cream/10 shadow-sm flex items-center justify-between">
              <div className="space-y-1.5">
                <span className="text-[10px] font-bold uppercase tracking-wider text-brand-textMuted">Average Rating</span>
                <p className="text-3xl font-bold font-serif text-brand-dark dark:text-brand-cream">
                  {averageRating > 0 ? `${averageRating} / 5` : 'No ratings'}
                </p>
              </div>
              <div className="bg-brand-gold/10 p-3 rounded-xl text-brand-gold">
                <Icons.Star className="w-6 h-6 fill-brand-gold text-brand-gold" />
              </div>
            </div>

            <div className="bg-white dark:bg-brand-cardDark p-6 rounded-2xl border border-brand-dark/10 dark:border-brand-cream/10 shadow-sm flex items-center justify-between">
              <div className="space-y-1.5">
                <span className="text-[10px] font-bold uppercase tracking-wider text-brand-textMuted">Most Popular Room</span>
                <p className="text-lg font-bold font-serif text-brand-dark dark:text-brand-cream truncate max-w-[150px]">{popularRoomTypes[0]?.name || 'N/A'}</p>
              </div>
              <div className="bg-brand-gold/10 p-3 rounded-xl text-brand-gold">
                <Icons.Flame className="w-6 h-6" />
              </div>
            </div>

            <div className="bg-white dark:bg-brand-cardDark p-6 rounded-2xl border border-brand-dark/10 dark:border-brand-cream/10 shadow-sm flex items-center justify-between">
              <div className="space-y-1.5">
                <span className="text-[10px] font-bold uppercase tracking-wider text-brand-textMuted">Storage Node</span>
                <p className="text-xs font-semibold bg-brand-gold/10 text-brand-gold px-2.5 py-1 rounded-md mt-1 inline-block">Local Storage (Active)</p>
              </div>
              <div className="bg-brand-gold/10 p-3 rounded-xl text-brand-gold">
                <Icons.Database className="w-6 h-6" />
              </div>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div className="lg:col-span-6 bg-white dark:bg-brand-cardDark p-6 sm:p-8 rounded-3xl border border-brand-dark/10 dark:border-brand-cream/10 shadow-sm space-y-6">
              <div>
                <h3 className="font-serif text-lg font-bold text-brand-dark dark:text-brand-cream">Room Type Popularity</h3>
                <p className="text-xs text-brand-textMuted">Distribution of AI furniture set requests across different room classes.</p>
              </div>
              <div className="border border-brand-dark/5 dark:border-brand-cream/5 p-4 rounded-2xl bg-brand-cream/20 dark:bg-brand-bgDark/20">
                <BarChart data={popularRoomTypes} />
              </div>
            </div>

            <div className="lg:col-span-6 bg-white dark:bg-brand-cardDark p-6 sm:p-8 rounded-3xl border border-brand-dark/10 dark:border-brand-cream/10 shadow-sm space-y-6">
              <div>
                <h3 className="font-serif text-lg font-bold text-brand-dark dark:text-brand-cream">Budget Distribution</h3>
                <p className="text-xs text-brand-textMuted">Segmentation of design requests by customer pricing category (₹).</p>
              </div>
              <div className="border border-brand-dark/5 dark:border-brand-cream/5 p-4 rounded-2xl bg-brand-cream/20 dark:bg-brand-bgDark/20">
                <DonutChart data={budgetDistribution} />
              </div>
            </div>

            <div className="lg:col-span-12 bg-white dark:bg-brand-cardDark p-6 sm:p-8 rounded-3xl border border-brand-dark/10 dark:border-brand-cream/10 shadow-sm space-y-6">
              <div>
                <h3 className="font-serif text-lg font-bold text-brand-dark dark:text-brand-cream">Daily Generation Trend</h3>
                <p className="text-xs text-brand-textMuted">Visual timeline representing mood boards generated over the past 7 days.</p>
              </div>
              <div className="border border-brand-dark/5 dark:border-brand-cream/5 p-6 rounded-2xl bg-brand-cream/20 dark:bg-brand-bgDark/20 overflow-x-auto">
                <div className="min-w-[480px]">
                  <LineChart data={dailyTrend} />
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // =========================================================================
    // App Bootstrap Component
    // =========================================================================
    function App() {
      const [currentPage, setCurrentPage] = useState('home');
      
      const [darkMode, setDarkMode] = useState(() => {
        const saved = localStorage.getItem('svs_dark_mode');
        return saved ? JSON.parse(saved) : false;
      });

      const [history, setHistory] = useState([]);

      useEffect(() => {
        if (darkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
        localStorage.setItem('svs_dark_mode', JSON.stringify(darkMode));
      }, [darkMode]);

      useEffect(() => {
        const stored = localStorage.getItem('svs_history');
        if (stored) {
          setHistory(JSON.parse(stored));
        } else {
          localStorage.setItem('svs_history', JSON.stringify(initialSeedData));
          setHistory(initialSeedData);
        }
      }, []);

      const toggleDarkMode = () => setDarkMode(!darkMode);

      const handleSaveSuggestion = (item) => {
        const updated = [item, ...history];
        setHistory(updated);
        localStorage.setItem('svs_history', JSON.stringify(updated));
      };

      const handleDeleteSuggestion = (id) => {
        const updated = history.filter(item => item.id !== id);
        setHistory(updated);
        localStorage.setItem('svs_history', JSON.stringify(updated));
      };

      const handleUpdateRating = (id, newRating) => {
        const updated = history.map(item => item.id === id ? { ...item, rating: newRating } : item);
        setHistory(updated);
        localStorage.setItem('svs_history', JSON.stringify(updated));
      };

      const renderPage = () => {
        switch (currentPage) {
          case 'home':
            return <Home navigate={setCurrentPage} />;
          case 'tool':
            return <SuggestionTool navigate={setCurrentPage} onSave={handleSaveSuggestion} />;
          case 'history':
            return <History navigate={setCurrentPage} list={history} onDelete={handleDeleteSuggestion} onUpdateRating={handleUpdateRating} />;
          case 'admin':
            return <AdminDashboard list={history} onRefresh={() => window.location.reload()} />;
          default:
            return <Home navigate={setCurrentPage} />;
        }
      };

      return (
        <ToastProvider>
          <div className="flex flex-col min-h-screen bg-brand-cream dark:bg-brand-bgDark text-brand-dark dark:text-brand-cream transition-colors duration-300">
            
            {/* Header Navigation */}
            <nav className="fixed top-0 left-0 right-0 z-40 bg-brand-cream/90 dark:bg-brand-bgDark/90 backdrop-blur-md border-b border-brand-dark/10 dark:border-brand-cream/10 no-print transition-colors duration-300">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="flex items-center justify-between h-20">
                  <div onClick={() => setCurrentPage('home')} className="flex items-center gap-3 cursor-pointer select-none group">
                    <div className="bg-brand-gold text-brand-cream p-2 rounded-lg transition-transform duration-300 group-hover:scale-105">
                      <Icons.Armchair className="w-6 h-6" />
                    </div>
                    <div>
                      <span className="font-serif text-lg sm:text-xl font-bold tracking-tight text-brand-dark dark:text-brand-cream group-hover:text-brand-gold transition-colors">Sri Venkata Sai</span>
                      <span className="block text-[10px] tracking-widest uppercase text-brand-gold font-medium">Furniture Works</span>
                    </div>
                  </div>

                  <div className="hidden md:flex items-center gap-8">
                    {[
                      { id: 'home', label: 'Home' },
                      { id: 'tool', label: 'AI Suggestion Tool' },
                      { id: 'history', label: 'History' },
                      { id: 'admin', label: 'Admin Analytics' }
                    ].map((link) => (
                      <button
                        key={link.id}
                        onClick={() => setCurrentPage(link.id)}
                        className={`font-sans text-sm font-medium tracking-wide transition-colors relative py-2 ${
                          currentPage === link.id ? 'text-brand-gold font-bold' : 'text-brand-dark/70 hover:text-brand-dark dark:text-brand-cream/70 dark:hover:text-brand-cream font-medium'
                        }`}
                      >
                        {link.label}
                        {currentPage === link.id && <span className="absolute bottom-0 left-0 right-0 h-0.5 bg-brand-gold rounded-full animate-fade-in" />}
                      </button>
                    ))}

                    <button onClick={toggleDarkMode} className="p-2.5 rounded-full hover:bg-brand-dark/5 dark:hover:bg-brand-cream/5 text-brand-gold transition-colors">
                      {darkMode ? <Icons.Sun className="w-5 h-5 animate-fade-in" /> : <Icons.Moon className="w-5 h-5 animate-fade-in" />}
                    </button>
                  </div>

                  {/* Mobile nav toggle */}
                  <div className="flex items-center gap-4 md:hidden">
                    <button onClick={toggleDarkMode} className="p-2 rounded-full hover:bg-brand-dark/5 dark:hover:bg-brand-cream/5 text-brand-gold">
                      {darkMode ? <Icons.Sun className="w-5 h-5" /> : <Icons.Moon className="w-5 h-5" />}
                    </button>
                    <button onClick={() => {
                      const menu = document.getElementById('mobile-menu');
                      menu.classList.toggle('hidden');
                    }} className="p-2 text-brand-dark dark:text-brand-cream hover:bg-brand-dark/5 dark:hover:bg-brand-cream/5 rounded-lg">
                      <Icons.Menu className="w-6 h-6" />
                    </button>
                  </div>
                </div>
              </div>

              {/* Mobile menu dropdown */}
              <div id="mobile-menu" className="hidden md:hidden bg-brand-cream dark:bg-brand-bgDark border-b border-brand-dark/10 dark:border-brand-cream/10 animate-fade-in shadow-lg">
                <div className="px-2 pt-2 pb-4 space-y-1 sm:px-3">
                  {[
                    { id: 'home', label: 'Home' },
                    { id: 'tool', label: 'AI Suggestion Tool' },
                    { id: 'history', label: 'History' },
                    { id: 'admin', label: 'Admin Analytics' }
                  ].map((link) => (
                    <button
                      key={link.id}
                      onClick={() => {
                        setCurrentPage(link.id);
                        document.getElementById('mobile-menu').classList.add('hidden');
                      }}
                      className={`w-full text-left px-4 py-3 rounded-lg text-base font-medium tracking-wide transition-colors ${
                        currentPage === link.id ? 'bg-brand-gold/10 text-brand-gold font-semibold' : 'text-brand-dark/70 hover:bg-brand-dark/5 hover:text-brand-dark dark:text-brand-cream/70 dark:hover:bg-brand-cream/5'
                      }`}
                    >
                      {link.label}
                    </button>
                  ))}
                </div>
              </div>
            </nav>

            {/* Page content container */}
            <main className="flex-grow pt-24 pb-16">
              <div className="animate-fade-in">
                {renderPage()}
              </div>
            </main>

            {/* Footer */}
            <footer className="bg-brand-dark text-brand-cream/80 border-t border-brand-gold/20 pt-16 pb-8 no-print transition-colors duration-300">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="grid grid-cols-1 md:grid-cols-4 gap-10 mb-12">
                  <div className="md:col-span-2 space-y-4">
                    <div className="flex items-center gap-3 text-brand-cream">
                      <div className="bg-brand-gold text-brand-cream p-2 rounded-lg">
                        <Icons.Armchair className="w-5 h-5" />
                      </div>
                      <span className="font-serif text-xl font-bold tracking-tight">Sri Venkata Sai Furniture Works</span>
                    </div>
                    <p className="text-sm leading-relaxed max-w-sm">Crafting premium wooden furniture designs with legacy craftsmanship for over three decades. Creating living spaces that reflect comfort, durability, and luxury.</p>
                  </div>
                  <div className="space-y-4">
                    <h4 className="font-serif text-brand-cream text-base font-semibold tracking-wider uppercase border-b border-brand-gold/20 pb-2">Explore</h4>
                    <ul className="space-y-2.5 text-sm">
                      <li><button onClick={() => setCurrentPage('home')} className="hover:text-brand-gold transition-colors text-left">Home</button></li>
                      <li><button onClick={() => setCurrentPage('tool')} className="hover:text-brand-gold transition-colors text-left">AI Suggestion Tool</button></li>
                      <li><button onClick={() => setCurrentPage('history')} className="hover:text-brand-gold transition-colors text-left">Suggestion History</button></li>
                      <li><button onClick={() => setCurrentPage('admin')} className="hover:text-brand-gold transition-colors text-left">Admin Dashboard</button></li>
                    </ul>
                  </div>
                  <div className="space-y-4">
                    <h4 className="font-serif text-brand-cream text-base font-semibold tracking-wider uppercase border-b border-brand-gold/20 pb-2">Get in Touch</h4>
                    <ul className="space-y-3 text-sm">
                      <li className="flex items-start gap-2.5">
                        <Icons.MapPin className="w-4 h-4 text-brand-gold shrink-0 mt-0.5" />
                        <span>Industrial Area Road, Near Main Chowk, Hyderabad, Telangana, India</span>
                      </li>
                      <li className="flex items-center gap-2.5">
                        <Icons.Phone className="w-4 h-4 text-brand-gold shrink-0" />
                        <a href="tel:+919876543210" className="hover:text-brand-gold transition-colors">+91 98765 43210</a>
                      </li>
                      <li className="flex items-center gap-2.5">
                        <Icons.Mail className="w-4 h-4 text-brand-gold shrink-0" />
                        <a href="mailto:info@svsfurnitures.com" className="hover:text-brand-gold transition-colors">info@svsfurnitures.com</a>
                      </li>
                    </ul>
                  </div>
                </div>
                <div className="border-t border-brand-cream/10 pt-8 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs">
                  <p>&copy; {new Date().getFullYear()} Sri Venkata Sai Furniture Works. All rights reserved.</p>
                  <div className="flex gap-4">
                    <a href="#" className="hover:text-brand-gold transition-colors">Privacy Policy</a>
                    <a href="#" className="hover:text-brand-gold transition-colors">Terms of Service</a>
                  </div>
                </div>
              </div>
            </footer>

          </div>
        </ToastProvider>
      );
    }

    // =========================================================================
    // Mount App
    // =========================================================================
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);

  </script>
</body>
</html>
