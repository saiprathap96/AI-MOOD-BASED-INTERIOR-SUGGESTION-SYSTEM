{% raw %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVS Furniture Works - AI Mood Board Designer</title>
    
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c084fc',
                            400: '#a855f7',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                        },
                        glass: {
                            50: 'rgba(255, 255, 255, 0.03)',
                            100: 'rgba(255, 255, 255, 0.05)',
                            200: 'rgba(255, 255, 255, 0.1)',
                            border: 'rgba(255, 255, 255, 0.08)'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0c0a17;
            color: #f3f4f6;
            overflow-x: hidden;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f0c22;
        }
        ::-webkit-scrollbar-thumb {
            background: #2b254a;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4b3e8a;
        }
        .glass-panel {
            background: rgba(20, 18, 38, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .gradient-text {
            background: linear-gradient(135deg, #a855f7 0%, #8b5cf6 50%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glow-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .glow-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.5s ease;
        }
        .glow-btn:hover::after {
            left: 100%;
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="root"></div>

    <!-- React App Component Script -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // =======================================================
        // SVG Icons Components
        // =======================================================
        const Icons = {
            Sparkles: () => (
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
            ),
            History: () => (
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            ),
            Analytics: () => (
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h2a2 2 0 002-2zm12-5a2 2 0 00-2-2h-2a2 2 0 00-2 2v5a2 2 0 002 2h2a2 2 0 002-2v-5zM11 5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2V5z"/></svg>
            ),
            ArrowRight: () => (
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"/></svg>
            ),
            Copy: () => (
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
            ),
            Download: () => (
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            ),
            Refresh: () => (
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H17"/></svg>
            ),
            Check: () => (
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"/></svg>
            ),
            Info: () => (
                <svg className="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            )
        };

        // =======================================================
        // App Main Root
        // =======================================================
        function App() {
            const [currentTab, setCurrentTab] = useState('generator'); // 'generator', 'analytics', 'history-view'
            const [roomType, setRoomType] = useState('Living Room');
            const [colorPalette, setColorPalette] = useState('Ocean Breeze');
            const [budget, setBudget] = useState('3000');
            const [isLoading, setIsLoading] = useState(false);
            const [generatedData, setGeneratedData] = useState(null);
            const [history, setHistory] = useState([]);
            const [templates, setTemplates] = useState([]);
            const [analytics, setAnalytics] = useState(null);
            
            // Rating and comments states
            const [rating, setRating] = useState(0);
            const [hoverRating, setHoverRating] = useState(0);
            const [comment, setComment] = useState('');
            const [feedbackSubmitted, setFeedbackSubmitted] = useState(false);

            // Copy indicator state
            const [copied, setCopied] = useState(false);

            // Chart DOM References
            const usageChartRef = useRef(null);
            const ratingChartRef = useRef(null);
            const usageChartInstance = useRef(null);
            const ratingChartInstance = useRef(null);

            const palettes = [
                { name: 'Warm Autumn', colors: ['#c2410c', '#b45309', '#fdf6e2'], desc: 'Terracotta, Ochre, Soft Cream' },
                { name: 'Ocean Breeze', colors: ['#1d4ed8', '#0d9488', '#f0fdfa'], desc: 'Navy, Teal, Seafoam & Sand' },
                { name: 'Forest Sanctuary', colors: ['#15803d', '#047857', '#f0fdf4'], desc: 'Sage, Emerald & Natural Wood' },
                { name: 'Minimalist Monochrome', colors: ['#1f2937', '#4b5563', '#ffffff'], desc: 'Charcoal, Slate Grey & White' },
                { name: 'Sunset Glow', colors: ['#be185d', '#d97706', '#fff5f5'], desc: 'Dusty Rose, Amber & Gold' }
            ];

            const roomTypes = ['Living Room', 'Bedroom', 'Dining Room', 'Home Office', 'Guest Room'];

            // Fetch History and Templates on Mount
            useEffect(() => {
                fetchHistory();
                fetchTemplates();
                fetchAnalytics();
            }, []);

            // Handle Analytics Charts Initialization
            useEffect(() => {
                if (currentTab === 'analytics' && analytics) {
                    initCharts();
                }
                return () => {
                    destroyCharts();
                };
            }, [currentTab, analytics]);

            const fetchHistory = async () => {
                try {
                    const res = await fetch('/api/history');
                    if (res.ok) {
                        const data = await res.json();
                        setHistory(data);
                    }
                } catch (e) {
                    console.error("Failed to load history list", e);
                }
            };

            const fetchTemplates = async () => {
                try {
                    const res = await fetch('/api/templates');
                    if (res.ok) {
                        const data = await res.json();
                        setTemplates(data);
                    }
                } catch (e) {
                    console.error("Failed to load templates", e);
                }
            };

            const fetchAnalytics = async () => {
                try {
                    const res = await fetch('/api/analytics');
                    if (res.ok) {
                        const data = await res.json();
                        setAnalytics(data);
                    }
                } catch (e) {
                    console.error("Failed to load analytics", e);
                }
            };

            const handleSelectPreset = (tpl) => {
                setRoomType(tpl.room_type);
                setColorPalette(tpl.color_palette);
                setBudget(tpl.budget.toString());
                setCurrentTab('generator');
            };

            const handleSubmit = async (e) => {
                if (e) e.preventDefault();
                if (!budget || isNaN(budget) || parseFloat(budget) <= 0) {
                    alert("Please enter a valid budget amount greater than 0");
                    return;
                }

                setIsLoading(true);
                setGeneratedData(null);
                setFeedbackSubmitted(false);
                setRating(0);
                setComment('');

                try {
                    const res = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            room_type: roomType,
                            color_palette: colorPalette,
                            budget: parseFloat(budget)
                        })
                    });

                    if (res.ok) {
                        const data = await res.json();
                        setGeneratedData(data);
                        fetchHistory();
                        fetchAnalytics();
                    } else {
                        const err = await res.json();
                        alert(`Error generating: ${err.error || 'Server error'}`);
                    }
                } catch (e) {
                    console.error("Generation request failed", e);
                    alert("Failed to connect to AI server. Please try again.");
                } finally {
                    setIsLoading(false);
                }
            };

            const handleLoadHistoryItem = async (histId) => {
                setIsLoading(true);
                setGeneratedData(null);
                setFeedbackSubmitted(false);
                
                try {
                    const res = await fetch(`/api/history/${histId}`);
                    if (res.ok) {
                        const data = await res.json();
                        setGeneratedData(data);
                        setRoomType(data.room_type);
                        setColorPalette(data.color_palette);
                        setBudget(data.budget.toString());
                        
                        if (data.rating) {
                            setRating(data.rating);
                            setComment(data.feedback_comment || '');
                            setFeedbackSubmitted(true);
                        } else {
                            setRating(0);
                            setComment('');
                        }
                        
                        setCurrentTab('generator');
                    }
                } catch (e) {
                    console.error("Failed to load history details", e);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleFeedbackSubmit = async (e) => {
                e.preventDefault();
                if (rating === 0) {
                    alert("Please select a rating of 1 to 5 stars before submitting.");
                    return;
                }

                try {
                    const res = await fetch('/api/feedback', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            output_id: generatedData.output_id,
                            rating: rating,
                            comment: comment
                        })
                    });

                    if (res.ok) {
                        setFeedbackSubmitted(true);
                        fetchHistory();
                        fetchAnalytics();
                    } else {
                        alert("Failed to submit feedback.");
                    }
                } catch (e) {
                    console.error("Error submitting rating", e);
                }
            };

            const handleCopyToClipboard = () => {
                if (!generatedData) return;
                
                let text = `--- SVS FURNITURE WORKS AI MOOD BOARD ---\n`;
                text += `Room: ${generatedData.room_type}\n`;
                text += `Theme/Palette: ${generatedData.color_palette}\n`;
                text += `Budget Limit: $${generatedData.budget}\n\n`;
                text += `SUGGESTED FURNITURE CO-SET:\n`;
                
                generatedData.furniture_set.forEach((item, index) => {
                    text += `${index + 1}. ${item.name} (${item.category})\n`;
                    text += `   Price: $${item.price}\n`;
                    text += `   Dims: ${item.dimensions}\n`;
                    text += `   Desc: ${item.description}\n\n`;
                });
                
                text += `STYLING NOTES:\n${generatedData.styling_notes}\n`;
                text += `Total Set Cost: $${generatedData.total_set_cost}\n`;
                
                navigator.clipboard.writeText(text);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const handleExportText = () => {
                if (!generatedData) return;

                let text = `--- SVS FURNITURE WORKS AI MOOD BOARD ---\n`;
                text += `Room Type: ${generatedData.room_type}\n`;
                text += `Color Palette: ${generatedData.color_palette}\n`;
                text += `Budget: $${generatedData.budget}\n\n`;
                text += `SUGGESTED FURNITURE SET:\n`;
                
                generatedData.furniture_set.forEach((item, index) => {
                    text += `${index + 1}. ${item.name}\n`;
                    text += `   Category: ${item.category}\n`;
                    text += `   Price: $${item.price}\n`;
                    text += `   Dimensions: ${item.dimensions}\n`;
                    text += `   Description: ${item.description}\n\n`;
                });
                
                text += `STYLING NOTES:\n${generatedData.styling_notes}\n\n`;
                text += `Total Estimated Cost: $${generatedData.total_set_cost}\n`;

                const element = document.createElement("a");
                const file = new Blob([text], {type: 'text/plain'});
                element.href = URL.createObjectURL(file);
                element.download = `SVS_Moodboard_${generatedData.room_type.replace(' ', '_')}.txt`;
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
            };

            const destroyCharts = () => {
                if (usageChartInstance.current) {
                    usageChartInstance.current.destroy();
                    usageChartInstance.current = null;
                }
                if (ratingChartInstance.current) {
                    ratingChartInstance.current.destroy();
                    ratingChartInstance.current = null;
                }
            };

            const initCharts = () => {
                destroyCharts();

                if (!analytics) return;

                // 1. Usage Trend Line Chart
                const usageCtx = usageChartRef.current.getContext('2d');
                usageChartInstance.current = new Chart(usageCtx, {
                    type: 'line',
                    data: {
                        labels: analytics.usage_trend.labels,
                        datasets: [{
                            label: 'Daily Generations',
                            data: analytics.usage_trend.data,
                            borderColor: '#8b5cf6',
                            backgroundColor: 'rgba(139, 92, 246, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.3,
                            pointBackgroundColor: '#a855f7',
                            pointHoverRadius: 7
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                grid: { color: 'rgba(255, 255, 255, 0.05)' },
                                ticks: { color: '#9ca3af' }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: '#9ca3af' }
                            }
                        }
                    }
                });

                // 2. Average User Ratings Trend Line Chart
                const ratingCtx = ratingChartRef.current.getContext('2d');
                ratingChartInstance.current = new Chart(ratingCtx, {
                    type: 'bar',
                    data: {
                        labels: analytics.rating_trend.labels,
                        datasets: [{
                            label: 'Average Score',
                            data: analytics.rating_trend.data,
                            backgroundColor: '#a855f7',
                            borderRadius: 6,
                            borderWidth: 0,
                            barPercentage: 0.5
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                max: 5,
                                grid: { color: 'rgba(255, 255, 255, 0.05)' },
                                ticks: { color: '#9ca3af', stepSize: 1 }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: '#9ca3af' }
                            }
                        }
                    }
                });
            };

            return (
                <div className="flex min-h-screen bg-[#090714] text-gray-100">
                    
                    {/* =======================================================
                        1. LEFT SIDEBAR: Brand, Presets, and Saved Logs
                       ======================================================= */}
                    <aside className="w-80 border-r border-glass-border glass-panel flex flex-col hidden lg:flex">
                        {/* Logo header */}
                        <div className="p-6 border-b border-glass-border flex items-center space-x-3">
                            <div className="bg-brand-600 w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/20">
                                <span className="font-extrabold text-xl text-white">S</span>
                            </div>
                            <div>
                                <h1 className="font-bold text-base leading-tight tracking-wider text-white">SVS FURNITURE</h1>
                                <p className="text-xs text-purple-400 font-medium">AI Mood Board Designer</p>
                            </div>
                        </div>

                        {/* Presets / Templates Panel */}
                        <div className="p-5 border-b border-glass-border">
                            <h2 className="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-3 flex items-center">
                                <span className="mr-1.5"><Icons.Sparkles /></span> One-Click Design Presets
                            </h2>
                            <div className="space-y-2">
                                {templates.slice(0, 5).map((tpl, i) => (
                                    <button 
                                        key={i}
                                        onClick={() => handleSelectPreset(tpl)}
                                        className="w-full text-left p-2.5 text-xs rounded-lg glass-panel hover:bg-brand-900/30 border border-transparent hover:border-brand-500/30 transition-all flex items-center justify-between group"
                                    >
                                        <span className="truncate pr-2 font-medium text-gray-200 group-hover:text-white">{tpl.label}</span>
                                        <span className="text-purple-400 font-semibold text-[10px] group-hover:translate-x-0.5 transition-transform flex items-center">
                                            ${tpl.budget} <Icons.ArrowRight />
                                        </span>
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* History Log Sidebar Section */}
                        <div className="flex-1 overflow-y-auto p-5">
                            <h2 className="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-3 flex items-center">
                                <span className="mr-1.5"><Icons.History /></span> Saved Generations History
                            </h2>
                            {history.length === 0 ? (
                                <p className="text-xs text-gray-500 italic text-center py-6">No saved history yet</p>
                            ) : (
                                <div className="space-y-3">
                                    {history.map((hist, idx) => (
                                        <div 
                                            key={idx} 
                                            onClick={() => handleLoadHistoryItem(hist.history_id)}
                                            className={`p-3 rounded-lg border cursor-pointer transition-all ${
                                                generatedData && generatedData.history_id === hist.history_id 
                                                ? 'bg-brand-900/30 border-brand-500/60 shadow-lg shadow-brand-500/5' 
                                                : 'glass-panel border-white/5 hover:border-white/10 hover:bg-white/5'
                                            }`}
                                        >
                                            <div className="flex justify-between items-start mb-1">
                                                <span className="text-xs font-bold text-white truncate w-28">{hist.room_type}</span>
                                                <span className="text-[10px] font-semibold text-purple-400 bg-brand-950/40 px-1.5 py-0.5 rounded">${hist.budget}</span>
                                            </div>
                                            <div className="flex items-center justify-between text-[10px] text-gray-400">
                                                <span>{hist.color_palette}</span>
                                                <span className="text-yellow-400 flex items-center">
                                                    {hist.rating ? '★'.repeat(hist.rating) : 'Unrated'}
                                                </span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </aside>

                    {/* =======================================================
                        2. MAIN WORKSPACE / LAYOUT
                       ======================================================= */}
                    <main className="flex-1 flex flex-col min-w-0">
                        {/* HEADER NAVIGATION */}
                        <header className="h-16 border-b border-glass-border glass-panel px-6 flex items-center justify-between sticky top-0 z-30">
                            {/* Mobile Logo Brand */}
                            <div className="flex items-center space-x-2 lg:hidden">
                                <div className="bg-brand-600 w-8 h-8 rounded-lg flex items-center justify-center">
                                    <span className="font-extrabold text-sm text-white">S</span>
                                </div>
                                <span className="font-bold text-sm text-white">SVS AI Designer</span>
                            </div>
                            
                            <nav className="flex space-x-6">
                                <button 
                                    onClick={() => setCurrentTab('generator')}
                                    className={`text-sm font-semibold py-2 px-1 relative transition-colors ${
                                        currentTab === 'generator' ? 'text-white' : 'text-gray-400 hover:text-gray-200'
                                    }`}
                                >
                                    Mood Board Generator
                                    {currentTab === 'generator' && (
                                        <div className="absolute bottom-[-17px] left-0 w-full h-[2px] bg-brand-500 shadow-md shadow-brand-500/50"></div>
                                    )}
                                </button>
                                <button 
                                    onClick={() => setCurrentTab('analytics')}
                                    className={`text-sm font-semibold py-2 px-1 relative transition-colors ${
                                        currentTab === 'analytics' ? 'text-white' : 'text-gray-400 hover:text-gray-200'
                                    }`}
                                >
                                    Analytics Dashboard
                                    {currentTab === 'analytics' && (
                                        <div className="absolute bottom-[-17px] left-0 w-full h-[2px] bg-brand-500 shadow-md shadow-brand-500/50"></div>
                                    )}
                                </button>
                            </nav>
                            
                            <div className="flex items-center space-x-4">
                                <span className="text-[10px] text-gray-500 uppercase tracking-widest hidden md:inline font-semibold">Active Session</span>
                                <div className="w-2.5 h-2.5 bg-green-500 rounded-full animate-ping"></div>
                            </div>
                        </header>

                        {/* CONTENT WRAPPER */}
                        <div className="flex-1 overflow-y-auto p-6 md:p-8">
                            
                            {/* =======================================================
                                TAB 1: MOOD BOARD GENERATOR WORKSPACE
                               ======================================================= */}
                            {currentTab === 'generator' && (
                                <div className="max-w-6xl mx-auto space-y-8">
                                    
                                    {/* App Pitch Banner */}
                                    <div className="p-6 rounded-2xl glass-panel relative overflow-hidden flex flex-col md:flex-row md:items-center justify-between border-l-4 border-l-brand-500">
                                        <div className="mb-4 md:mb-0">
                                            <h2 className="text-xl font-bold text-white mb-1">Boost Sales with Furniture Set Mood Boards</h2>
                                            <p className="text-xs text-gray-300 max-w-xl">

                                                    <p className="text-xs text-gray-400 max-w-sm">

                                                    </p>

                                                    {/* Header action bar */}
                                                    <div className="glass-panel p-5 rounded-2xl border border-glass-border flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">

                                                                            {item.category}
                                                                        </span>
                                                                        <span className="text-sm font-bold text-white">${item.price}</span>
                                                                    </div>
                                                                    <h4 className="font-bold text-sm text-white mb-2 leading-snug group-hover:text-purple-300 transition-colors">
                                                                        {item.name}

                                                                        {item.description}

                                                        <p className="text-xs text-gray-300 leading-relaxed">
                                                            {generatedData.styling_notes}

                                                    </div>

                                                                <p className="text-xs text-gray-200 font-semibold mb-1">Thank you for rating!</p>
                                                                <p className="text-[10px] text-purple-400">Your feedback helps SVS improve interior prompt alignment.</p>

                                                            <form onSubmit={handleFeedbackSubmit} className="space-y-4">

                                                                <div className="flex items-center space-x-1.5">

                                                                            onClick={() => setRating(s)}
                                                                            onMouseEnter={() => setHoverRating(s)}

                                                                            className="focus:outline-none"
                                                                        >
                                                                            <svg 
                                                                                className={`w-7 h-7 transition-colors ${
                                                                                    s <= (hoverRating || rating) ? 'text-yellow-400' : 'text-gray-600 hover:text-yellow-500'
                                                                                }`}

                                                                                stroke="currentColor" 
                                                                                strokeWidth="2" 
                                                                                viewBox="0 0 24 24"

                                                                            </svg>
                                                                        </button>

                                                </div>

                                                    </div>
                                                </div>

                                                <div className="glass-panel p-6 rounded-2xl border border-glass-border flex flex-col justify-between">
                                                    <span className="text-xs text-gray-400 uppercase tracking-wider font-semibold">Average Budget Inquiry</span>
                                                    <div className="mt-4 flex items-baseline justify-between">
                                                        <span className="text-3xl font-extrabold text-white">${analytics.avg_budget}</span>
                                                        <span className="text-[10px] text-purple-400 bg-brand-500/10 px-2 py-0.5 rounded font-bold">USD</span>
                                                    </div>
                                                </div>

                                                <div className="glass-panel p-6 rounded-2xl border border-glass-border flex flex-col justify-between">
                                                    <span className="text-xs text-gray-400 uppercase tracking-wider font-semibold">Customer Satisfaction</span>
                                                    <div className="mt-4 flex items-baseline justify-between">

                                                            {analytics.avg_rating > 0 ? `${analytics.avg_rating}/5.0` : 'No rating'}
                                                        </span>
                                                        <span className="text-[10px] text-yellow-400 font-bold flex items-center">
                                                            {'★'.repeat(Math.round(analytics.avg_rating)) || 'None'}

                                                    </div>
                                                </div>
                                            </div>

                                            {/* Charts Row */}
                                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">

                                                    <div className="h-64 relative">
                                                        <canvas ref={usageChartRef}></canvas>
                                                    </div>
                                                </div>

                                                <div className="glass-panel p-6 rounded-2xl border border-glass-border">
                                                    <h3 className="font-bold text-sm text-white mb-4">Feedback Rating Scores Trend</h3>
                                                    <div className="h-64 relative">
                                                        <canvas ref={ratingChartRef}></canvas>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">

                                                <div className="glass-panel p-6 rounded-2xl border border-glass-border">
                                                    <h3 className="font-bold text-sm text-white mb-4">Popularity by Room Layouts</h3>
                                                    <div className="space-y-3">
                                                        {Object.entries(analytics.room_types_popularity).map(([name, count], i) => (
                                                            <div key={i}>
                                                                <div className="flex justify-between text-xs text-gray-300 mb-1.5">
                                                                    <span>{name}</span>
                                                                    <span className="font-semibold text-white">{count} runs</span>
                                                                </div>
                                                                <div className="w-full bg-[#131024] h-2 rounded-full overflow-hidden">
                                                                    <div 
                                                                        className="h-full bg-brand-500 rounded-full"
                                                                        style={{ width: `${(count / analytics.total_generations) * 100}%` }}
                                                                    ></div>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>

                                                {/* Popular Color Palettes */}
                                                <div className="glass-panel p-6 rounded-2xl border border-glass-border">
                                                    <h3 className="font-bold text-sm text-white mb-4">Popularity by Color Aesthetics</h3>
                                                    <div className="space-y-3">
                                                        {Object.entries(analytics.color_palettes_popularity).map(([name, count], i) => (
                                                            <div key={i}>
                                                                <div className="flex justify-between text-xs text-gray-300 mb-1.5">

                                                                    <span className="font-semibold text-white">{count} runs</span>

                                                                <div className="w-full bg-[#131024] h-2 rounded-full overflow-hidden">
                                                                    <div 
                                                                        className="h-full bg-indigo-500 rounded-full"
                                                                        style={{ width: `${(count / analytics.total_generations) * 100}%` }}
                                                                    ></div>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                        </div>
                    </main>

                </div>

        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
