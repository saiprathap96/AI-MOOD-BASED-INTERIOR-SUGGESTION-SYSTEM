services:
  - type: web
    name: ai-mood-furniture-backend
    env: node
    plan: free
    buildCommand: cd backend && rm -rf node_modules package-lock.json && npm install --verbose && npm rebuild sqlite3 --build-from-source
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: npm_config_build_from_source
        value: "true"
    routes:
      - path: /
        destination: /
